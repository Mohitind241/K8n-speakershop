id="hgtjlwm"
apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: speakershop-ingress

  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

spec:
  ingressClassName: nginx

  rules:
    - http:
        paths:
          - path: /

            pathType: Prefix

            backend:
              service:
                name: speakershop-service

                port:
                  number: 80
