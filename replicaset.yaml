id="gnjlwm"
apiVersion: apps/v1
kind: ReplicaSet

metadata:
  name: speakershop-replicaset

spec:
  replicas: 2

  selector:
    matchLabels:
      app: speakershop-replica

  template:

    metadata:
      labels:
        app: speakershop-replica

    spec:
      containers:

        - name: speakershop-container

          image: mohitdocker241/speakershop:v1.0.0

          ports:
            - containerPort: 3000
